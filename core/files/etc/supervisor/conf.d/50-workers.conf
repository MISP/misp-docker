# Workers are set to NOT auto start so we have time to enforce permissions on the cache first

[group:misp-workers]
programs=default,email,cache,prio,update,scheduler

[program:default]
directory=/var/www/MISP
command=/var/www/MISP/app/Console/cake start_worker default
process_name=%(program_name)s_%(process_num)02d
numprocs=%(ENV_NUM_WORKERS_DEFAULT)s
autostart=false
autorestart=true
redirect_stderr=true  ; Changed: Merge stderr into stdout for simpler aggregation (optional; see notes below)
stdout_logfile=/dev/stdout  ; Changed: From file path
stdout_logfile_maxbytes=0  ; Changed: Disable rotation
stderr_logfile=/dev/stderr  ; Changed: From file path (only needed if redirect_stderr=false)
stderr_logfile_maxbytes=0  ; Changed: Disable rotation
directory=/var/www/MISP
user=www-data

